title: "Privilege escalation via sudo vim"
description: >
  El usuario ctfuser tiene permisos sudo sobre vim sin contraseña.
  Escala privilegios y crea evidencia de acceso root.
author: "Dylan Riquelme"
level: beginner
category: pwning

environment:
  image: "flexipwn/vulnerable-sudo:latest"
  attacker_image: null
  log_paths: []
  ports: []
  startup_delay_seconds: 3

targets:
  - type: file_created
    path: "/root/"
    pattern: "*.txt"
    description: "Archivo .txt creado en directorio root por el atacante"

  - type: file_modified
    path: "/etc/passwd"
    description: "Archivo de usuarios modificado (usuario root agregado)"

condition: all
timeout_seconds: 1800

hints:
  - "Revisa qué comandos puedes ejecutar como root con sudo -l"
